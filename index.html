<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contrast Checker</title>
    
    <link rel="icon" href="image_31.png">
    <link rel="apple-touch-icon" href="image_31.png">

    <style>
        :root {
            --main: #333;
            --bg: #fff;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 360px;
            padding: 40px 20px;
            box-sizing: border-box;
            text-align: center;
        }

        h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 30px; letter-spacing: -1px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 0.75rem; font-weight: 800; margin-bottom: 8px; margin-left: 5px; color: #666; }

        .input-wrapper { position: relative; display: flex; align-items: center; }
        input {
            width: 100%;
            padding: 15px 45px 15px 15px;
            border: 2px solid var(--accent);
            border-radius: var(--radius);
            background: var(--input-bg);
            font-size: 1rem;
            font-weight: 600;
            color: var(--main) !important;
            box-sizing: border-box;
            outline: none;
            -webkit-appearance: none;
            -webkit-text-fill-color: var(--main) !important;
            opacity: 1 !important;
        }
        input::placeholder { color: #aaa !important; -webkit-text-fill-color: #aaa !important; font-weight: 500; }

        .clear-btn {
            position: absolute; right: 10px; width: 30px; height: 30px;
            background: var(--accent); color: #666; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: none; font-size: 18px; font-weight: bold;
        }

        #preview-card {
            margin-top: 30px; padding: 50px 20px;
            border-radius: var(--radius); border: 2px solid var(--accent);
            transition: 0.2s ease;
        }
        .result-title { font-size: 2.5rem; font-weight: 900; margin: 0; }
        .result-ratio { font-size: 1rem; font-weight: 700; margin-top: 10px; }
        .wcag-status {
            display: inline-block; margin-top: 15px; font-size: 0.75rem;
            font-weight: 800; padding: 6px 14px; border-radius: 10px;
            background: rgba(0,0,0,0.05);
        }

        .footer-btns { margin-top: 40px; }
        .kofi-btn {
            display: inline-block; background: var(--main); color: #fff;
            padding: 12px 25px; border-radius: var(--radius);
            text-decoration: none; font-weight: bold; font-size: 14px; margin-bottom: 12px;
        }
        .home-btn {
            display: block; width: 60%; margin: 0 auto; background: var(--accent);
            color: var(--main); border: none; padding: 10px;
            border-radius: var(--radius); font-weight: 700; font-size: 13px; cursor: pointer;
        }

        footer { margin-top: 40px; font-size: 11px; color: #aaa; line-height: 1.8; }
        .footer-copy { font-weight: bold; color: #999; margin-top: 8px; }

        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100;
        }
        .modal-content {
            background: #fff; width: 85%; max-width: 320px; padding: 30px;
            border-radius: var(--radius); text-align: left; position: relative;
        }
        .modal-content h3 { margin-top: 0; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }
        .modal-content p { font-size: 0.95rem; font-weight: 600; line-height: 1.6; color: #333; margin: 15px 0; }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 20px; color: #ccc; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>Contrast Checker</h1>

    <div class="input-group">
        <label>Background Color</label>
        <div class="input-wrapper">
            <input type="text" id="bgInput" placeholder="#FFFFFF" spellcheck="false">
            <button class="clear-btn" onclick="clearInput('bgInput')">×</button>
        </div>
    </div>

    <div class="input-group">
        <label>Text Color</label>
        <div class="input-wrapper">
            <input type="text" id="textInput" placeholder="#333333" spellcheck="false">
            <button class="clear-btn" onclick="clearInput('textInput')">×</button>
        </div>
    </div>

    <div id="preview-card">
        <p class="result-title" id="statusText">WAIT</p>
        <div class="result-ratio" id="ratioText">Enter Hex codes</div>
        <div class="wcag-status" id="wcagText">-</div>
    </div>

    <div class="footer-btns">
        <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">☕ Support me on Ko-fi</a>
        <button class="home-btn" onclick="document.getElementById('modal').style.display='flex'">Add to Home Screen</button>
    </div>

    <footer>
        <div>No login / No tracking / No ads / Browser only</div>
        <div>Privacy Policy / afrorakda © 2026</div>
    </footer>
</div>

<div id="modal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-x" onclick="document.getElementById('modal').style.display='none'">×</span>
        <h3>📱 Install</h3>
        <p>Add to your home screen.</p>
        <p>🍏 <strong>iPhone (Safari):</strong><br>Tap Share, then Add to Home Screen.</p>
        <p>🤖 <strong>Android (Chrome):</strong><br>Tap Menu (⋮), then Add to Home Screen.</p>
    </div>
</div>

<script>
    const bgInput = document.getElementById('bgInput');
    const textInput = document.getElementById('textInput');
    const previewCard = document.getElementById('preview-card');
    const statusText = document.getElementById('statusText');
    const ratioText = document.getElementById('ratioText');
    const wcagText = document.getElementById('wcagText');

    function clearInput(id) {
        document.getElementById(id).value = '';
        checkContrast();
    }

    function getRGB(hex) {
        hex = hex.replace('#', '');
        if (hex.length === 3) hex = hex.split('').map(s => s + s).join('');
        if (hex.length !== 6) return null;
        const r = parseInt(hex.substr(0, 2), 16);
        const g = parseInt(hex.substr(2, 2), 16);
        const b = parseInt(hex.substr(4, 2), 16);
        return isNaN(r) || isNaN(g) || isNaN(b) ? null : [r, g, b];
    }

    function getLuminance(rgb) {
        const a = rgb.map(v => {
            v /= 255;
            return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
        });
        return a[0] * 0.2126 + a[1] * 0.7152 + a[2] * 0.0722;
    }

    function checkContrast() {
        const bgVal = bgInput.value || "#FFFFFF";
        const textVal = textInput.value || "#333333";
        const bgRGB = getRGB(bgVal);
        const textRGB = getRGB(textVal);

        if (!bgRGB || !textRGB) {
            statusText.innerText = "WAIT";
            ratioText.innerText = "Check your Hex code";
            wcagText.innerText = "-";
            previewCard.style.backgroundColor = "#fafafa";
            previewCard.style.color = "#ccc";
            return;
        }

        const l1 = getLuminance(bgRGB);
        const l2 = getLuminance(textRGB);
        const ratio = (Math.max(l1, l2) + 0.05) / (Math.min(l1, l2) + 0.05);
        
        previewCard.style.backgroundColor = bgVal;
        previewCard.style.color = textVal;
        ratioText.innerText = `Ratio: ${ratio.toFixed(2)}:1`;

        if (ratio >= 4.5) {
            statusText.innerText = "PASS";
            wcagText.innerText = "WCAG AA: SUCCESS";
        } else if (ratio >= 3) {
            statusText.innerText = "WEAK";
            wcagText.innerText = "WCAG AA (Large): PASS";
        } else {
            statusText.innerText = "FAIL";
            wcagText.innerText = "WCAG AA: FAILED";
        }
    }

    bgInput.addEventListener('input', checkContrast);
    textInput.addEventListener('input', checkContrast);
    checkContrast();
</script>

</body>
</html>
